<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Sistema de Consulta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <!-- TOPO -->
    <div class="topo">
        <img src="{{ url_for('static', filename='img/logo.png') }}"
             alt="Logo" class="logo">
    </div>

    <!-- MENU -->
    <div class="menu">
        <a href="/">Nova Consulta</a>
        <a href="/historico">Histórico</a>
    </div>

    <!-- MENSAGEM DE ERRO -->
    <div style="text-align: center; margin-top: 40px;">
        <h1 style="color: #dc3545; margin-bottom: 20px;">⚠️ Erro</h1>
        <p style="font-size: 18px; color: #666; margin-bottom: 30px;">
            {{ mensagem | default('Algo deu errado. Tente novamente.') }}
        </p>

        <div style="display: flex; gap: 10px; justify-content: center;">
            <a href="/" class="btn-principal">Voltar para Início</a>
            <a href="/historico" class="btn-principal" style="background-color: #6c757d;">Ir para Histórico</a>
        </div>
    </div>

    <!-- RODAPÉ -->
    <footer style="margin-top: 60px;">
        Sistema de Consulta de Reparo de Para-brisas
        <br><br>
        © 2026
    </footer>

</div>

</body>

</html>
